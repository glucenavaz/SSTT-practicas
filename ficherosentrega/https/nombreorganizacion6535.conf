<VirtualHost *:80>
	ServerAdmin admin@nombreorganizacion6535.org
	ServerName www.nombreorganizacion6535.org
	ServerAlias nombreorganizacion6535.org
	DocumentRoot /var/www/nombreorganizacion6535
	
	<Directory /var/www/nombreorganizacion6535>
		AllowOverride None
		Order allow,deny
		allow from all
	</Directory>
</VirtualHost>

<VirtualHost *:443>
	ServerAdmin edu@sstt.com
	ServerName www.nombreorganizacion6535.org
	ServerAlias nombreorganizacion6535.org
	DocumentRoot /var/www/nombreorganizacion6535

	<Directory /var/www/nombreorganizacion6535>
		AllowOverride None
		Order allow,deny
		allow from all
	</Directory>

	SSLEngine on
	SSLCertificateFile /home/alumno/demoCA/servercertSAN.pem
	SSLCertificateKeyFile /home/alumno/demoCA/serverkeySAN.pem
	SSLCACertificateFile /home/alumno/demoCA/cacert.pem
	SSLVerifyClient require
	SSLVerifyDepth 10
</VirtualHost>
